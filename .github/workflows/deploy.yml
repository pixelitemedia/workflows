name: WP Plugin Deploy

on:
  workflow_call:
    inputs:
      target:
        description: 'Server target identifier: sandbox | trywpem | custom (then provide host/user)'
        required: true
        type: string
      plugin-slug:
        description: 'Plugin folder name on the server (defaults to repo name)'
        type: string
        default: ''
      ref:
        description: 'Branch / tag / SHA to deploy (defaults to triggering ref)'
        type: string
        default: ''
      host:
        description: 'Override host (only honoured when target == custom)'
        type: string
        default: ''
      ssh-user:
        description: 'Override SSH user (only honoured when target == custom)'
        type: string
        default: ''
      label:
        description: 'Display label for the target (only honoured when target == custom)'
        type: string
        default: ''
      rsync-extra-excludes:
        description: 'Newline-separated extra rsync --exclude patterns'
        type: string
        default: ''
    secrets:
      DEPLOY_KEY:
        required: true
        description: 'Private SSH key matching the rrsync-restricted authorized_keys entry on the target'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.target }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target config
        id: cfg
        env:
          OVERRIDE_HOST: ${{ inputs.host }}
          OVERRIDE_USER: ${{ inputs.ssh-user }}
          OVERRIDE_LABEL: ${{ inputs.label }}
        run: |
          case "${{ inputs.target }}" in
            sandbox)
              echo "host=192.254.232.182"     >> "$GITHUB_OUTPUT"
              echo "user=msykes"              >> "$GITHUB_OUTPUT"
              echo "label=sandbox.em.cm"      >> "$GITHUB_OUTPUT"
              ;;
            trywpem)
              echo "host=162.241.217.222"    >> "$GITHUB_OUTPUT"
              echo "user=trywpemc"           >> "$GITHUB_OUTPUT"
              echo "label=trywpem.com"       >> "$GITHUB_OUTPUT"
              ;;
            custom)
              if [ -z "$OVERRIDE_HOST" ] || [ -z "$OVERRIDE_USER" ]; then
                echo "::error::target=custom requires host + ssh-user inputs."
                exit 1
              fi
              echo "host=$OVERRIDE_HOST"                       >> "$GITHUB_OUTPUT"
              echo "user=$OVERRIDE_USER"                       >> "$GITHUB_OUTPUT"
              echo "label=${OVERRIDE_LABEL:-$OVERRIDE_HOST}"   >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown deploy target '${{ inputs.target }}'. Valid: sandbox, trywpem, custom."
              exit 1
              ;;
          esac

      - name: Resolve ref to check out
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_REF: ${{ github.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            echo "value=$INPUT_REF" >> "$GITHUB_OUTPUT"
            echo "Using explicit ref: $INPUT_REF"
          else
            echo "value=$DEFAULT_REF" >> "$GITHUB_OUTPUT"
            echo "Using triggering ref: $DEFAULT_REF"
          fi

      - name: Checkout plugin (${{ steps.ref.outputs.value }})
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Resolve plugin slug
        id: slug
        run: |
          SLUG="${{ inputs.plugin-slug }}"
          [ -z "$SLUG" ] && SLUG="${{ github.event.repository.name }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Deploying as slug: $SLUG"

      - name: Capture deployed commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          MSG=$(git log -1 --pretty=format:'%s' | tr -d '`' | head -c 200)
          AUTHOR=$(git log -1 --pretty=format:'%an')
          DATE=$(git log -1 --pretty=format:'%cI')
          echo "sha=$SHA"          >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"      >> "$GITHUB_OUTPUT"
          echo "message=$MSG"      >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR"    >> "$GITHUB_OUTPUT"
          echo "date=$DATE"        >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SIZE=$(wc -c < ~/.ssh/id_deploy)
          LINES=$(wc -l < ~/.ssh/id_deploy)
          echo "Key file: $SIZE bytes, $LINES lines"
          if [ "$SIZE" -lt 100 ]; then
            echo "::error::DEPLOY_KEY secret is empty or too short ($SIZE bytes). Did you run gh secret set with the right key file?"
            exit 1
          fi
          if ! grep -q 'BEGIN OPENSSH PRIVATE KEY' ~/.ssh/id_deploy; then
            echo "::error::DEPLOY_KEY does not look like an OpenSSH private key (missing BEGIN header)"
            exit 1
          fi
          ssh-keyscan -T 10 -H "${{ steps.cfg.outputs.host }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "::group::Deploy key fingerprint"
          ssh-keygen -lf ~/.ssh/id_deploy
          echo "::endgroup::"

      - name: Build rsync excludes
        run: |
          cat > /tmp/rsync-excludes <<'EOF'
          .git
          .git/**
          .github
          .github/**
          .gitignore
          .gitattributes
          .editorconfig
          .DS_Store
          node_modules
          node_modules/**
          tests
          tests/**
          phpunit.xml
          phpunit.xml.dist
          .phpcs.xml
          .phpcs.xml.dist
          EOF
          if [ -n "${{ inputs.rsync-extra-excludes }}" ]; then
            echo "" >> /tmp/rsync-excludes
            echo "${{ inputs.rsync-extra-excludes }}" >> /tmp/rsync-excludes
          fi
          echo "::group::Effective exclude list"
          cat /tmp/rsync-excludes
          echo "::endgroup::"

      - name: Deploy via rsync (rrsync-restricted)
        id: deploy
        run: |
          set -o pipefail
          rsync -avz --delete \
            --exclude-from=/tmp/rsync-excludes \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o BatchMode=yes" \
            ./ \
            "${{ steps.cfg.outputs.user }}@${{ steps.cfg.outputs.host }}:${{ steps.slug.outputs.slug }}/" \
            2>&1 | tee /tmp/rsync.log
          {
            FILES=$(grep -cE '^[^ /]' /tmp/rsync.log 2>/dev/null || echo 0)
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          }

      - name: Summary
        if: always()
        run: |
          {
            ICON="✅"
            [ "${{ steps.deploy.outcome }}" = "failure" ] && ICON="❌"
            echo "## $ICON Deploy \`${{ steps.slug.outputs.slug }}\` → ${{ steps.cfg.outputs.label }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Plugin slug | \`${{ steps.slug.outputs.slug }}\` |"
            echo "| Target | \`${{ inputs.target }}\` (${{ steps.cfg.outputs.label }}) |"
            echo "| Host | \`${{ steps.cfg.outputs.host }}\` |"
            echo "| User | \`${{ steps.cfg.outputs.user }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ steps.ref.outputs.value }}\` |"
            echo "| Commit | \`${{ steps.sha.outputs.short }}\` — ${{ steps.sha.outputs.message }} |"
            echo "| Author | ${{ steps.sha.outputs.author }} |"
            echo "| Committed | ${{ steps.sha.outputs.date }} |"
            echo "| Outcome | \`${{ steps.deploy.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
