name: WP Plugin CI

on:
  workflow_call:
    inputs:
      php-versions:
        description: 'JSON array of PHP versions for syntax matrix'
        type: string
        default: '["7.4", "8.0", "8.1", "8.2", "8.3"]'
      phpcs-standard:
        description: 'PHPCS standard slug (WordPress-Core, WordPress, WordPress-Extra, etc.)'
        type: string
        default: 'WordPress-Core'
      phpcs-paths:
        description: 'Space-separated paths to scan'
        type: string
        default: '.'
      phpcs-exclude:
        description: 'Comma-separated path exclusions for PHPCS'
        type: string
        default: '*/vendor/*,*/node_modules/*,*/dist/*,*/build/*'

permissions:
  contents: read

jobs:
  syntax:
    name: PHP ${{ matrix.php }} syntax
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: Lint PHP files
        run: |
          set -o pipefail
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::Parse error on PHP ${{ matrix.php }}"
              php -l "$file" 2>&1 | tail -n +2 | head -1
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . \
            -type d \( -name vendor -o -name node_modules -o -name dist -o -name build -o -name .git \) -prune -o \
            -type f -name '*.php' -print0)
          echo "::notice::Found $ERRORS parse error(s) on PHP ${{ matrix.php }}"
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

  phpcs:
    name: PHPCS (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: cs2pr, composer:v2

      - name: Cache PHPCS standards
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: phpcs-standards-v1-${{ runner.os }}

      - name: Install PHPCS + WP/WC/Compat standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.10" \
            "wp-coding-standards/wpcs:^3.1" \
            "phpcompatibility/phpcompatibility-wp:^2.1" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Show registered standards
        run: phpcs -i

      - name: Run PHPCS (checkstyle + summary)
        id: phpcs
        continue-on-error: true
        run: |
          phpcs \
            --standard='${{ inputs.phpcs-standard }}' \
            --ignore='${{ inputs.phpcs-exclude }}' \
            --extensions=php \
            --runtime-set ignore_warnings_on_exit 1 \
            --report-full \
            --report-checkstyle=./phpcs-checkstyle.xml \
            --report-summary=./phpcs-summary.txt \
            ${{ inputs.phpcs-paths }}

      - name: Annotate PR with PHPCS findings
        if: always()
        run: cs2pr --graceful-warnings ./phpcs-checkstyle.xml || true

      - name: Summarize PHPCS findings
        if: always()
        continue-on-error: true
        run: |
          REPORT=./phpcs-checkstyle.xml
          {
            echo "## PHPCS findings — \`${{ inputs.phpcs-standard }}\`"
            echo ""
            if [ ! -s "$REPORT" ]; then
              echo "No checkstyle report generated."
              exit 0
            fi
            FILES=$(grep -c '<file ' "$REPORT" 2>/dev/null) || FILES=0
            ERRORS=$(grep -c '<error ' "$REPORT" 2>/dev/null) || ERRORS=0
            WARNINGS=$(grep -c 'severity="warning"' "$REPORT" 2>/dev/null) || WARNINGS=0
            REAL_ERRORS=$((ERRORS - WARNINGS))
            FIXABLE=0
            if [ -s ./phpcs-summary.txt ]; then
              FIXABLE=$(grep -oE 'PHPCBF CAN FIX [0-9]+' ./phpcs-summary.txt 2>/dev/null | grep -oE '[0-9]+' | head -1)
              FIXABLE=${FIXABLE:-0}
            fi
            PCT_FIXABLE=0
            if [ "$REAL_ERRORS" -gt 0 ]; then
              PCT_FIXABLE=$(( FIXABLE * 100 / REAL_ERRORS ))
            fi
            echo "| Metric | Count |"
            echo "| --- | ---: |"
            echo "| Files with findings | $FILES |"
            echo "| Errors | $REAL_ERRORS |"
            echo "| Warnings | $WARNINGS |"
            echo "| Auto-fixable (\`phpcbf\`) | $FIXABLE (${PCT_FIXABLE}% of errors) |"
            echo ""
            if [ "$FILES" != "0" ]; then
              echo "### Top 10 sniffs"
              echo ""
              echo "| Count | Sniff |"
              echo "| ---: | --- |"
              grep -oE 'source="[^"]+"' "$REPORT" \
                | sort | uniq -c | sort -rn | head -10 \
                | while read -r count src; do
                    sniff=$(echo "$src" | sed -E 's/source="([^"]+)"/\1/')
                    echo "| $count | \`$sniff\` |"
                  done
              echo ""
            fi
            if [ "$FIXABLE" -gt 0 ]; then
              echo "Run \`phpcbf --standard=${{ inputs.phpcs-standard }} .\` locally to auto-fix the $FIXABLE mechanical issues."
              echo ""
            fi
            echo "_All findings are informational and do not gate merges. Download the \`phpcs-checkstyle\` artifact for the full report._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PHPCS report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-checkstyle
          path: ./phpcs-checkstyle.xml
          if-no-files-found: ignore

  php-compatibility:
    name: PHP Compatibility (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: cs2pr, composer:v2

      - name: Cache PHPCS standards
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: phpcs-standards-v1-${{ runner.os }}

      - name: Install PHPCS + PHPCompatibilityWP
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.10" \
            "phpcompatibility/phpcompatibility-wp:^2.1" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Detect minimum PHP from plugin header
        id: minphp
        run: |
          MIN_PHP=$(grep -rihE '^[[:space:]]*\*?[[:space:]]*Requires PHP:' --include='*.php' --include='readme.txt' . 2>/dev/null \
            | head -1 \
            | sed -E 's/.*Requires PHP:[[:space:]]*([0-9]+\.[0-9]+).*/\1/')
          if [ -z "$MIN_PHP" ]; then MIN_PHP="7.4"; echo "No 'Requires PHP' header found; defaulting to 7.4"; fi
          echo "min_php=$MIN_PHP" >> "$GITHUB_OUTPUT"
          echo "Testing PHP compatibility from $MIN_PHP onward"

      - name: Run PHPCompatibilityWP
        id: phpcompat
        continue-on-error: true
        run: |
          phpcs \
            --standard=PHPCompatibilityWP \
            --runtime-set testVersion '${{ steps.minphp.outputs.min_php }}-' \
            --ignore='${{ inputs.phpcs-exclude }}' \
            --extensions=php \
            --report-full \
            --report-checkstyle=./phpcompat-checkstyle.xml \
            ${{ inputs.phpcs-paths }}

      - name: Annotate PR with PHP compat findings
        if: always()
        run: cs2pr --graceful-warnings ./phpcompat-checkstyle.xml || true

      - name: Summarize PHP compatibility findings
        if: always()
        continue-on-error: true
        run: |
          REPORT=./phpcompat-checkstyle.xml
          {
            echo "## PHP Compatibility — testing \`${{ steps.minphp.outputs.min_php }}+\`"
            echo ""
            if [ ! -s "$REPORT" ]; then
              echo "No checkstyle report generated."
              exit 0
            fi
            FILES=$(grep -c '<file ' "$REPORT" 2>/dev/null) || FILES=0
            ERRORS=$(grep -c '<error ' "$REPORT" 2>/dev/null) || ERRORS=0
            WARNINGS=$(grep -c 'severity="warning"' "$REPORT" 2>/dev/null) || WARNINGS=0
            REAL_ERRORS=$((ERRORS - WARNINGS))
            if [ "$FILES" = "0" ]; then
              echo "Clean. No PHP version-compatibility issues detected from \`${{ steps.minphp.outputs.min_php }}\` onward."
              exit 0
            fi
            echo "| Metric | Count |"
            echo "| --- | ---: |"
            echo "| Files with findings | $FILES |"
            echo "| Errors | $REAL_ERRORS |"
            echo "| Warnings | $WARNINGS |"
            echo ""
            echo "### Top sniffs"
            echo ""
            echo "| Count | Sniff |"
            echo "| ---: | --- |"
            grep -oE 'source="[^"]+"' "$REPORT" \
              | sort | uniq -c | sort -rn | head -10 \
              | while read -r count src; do
                  sniff=$(echo "$src" | sed -E 's/source="([^"]+)"/\1/')
                  echo "| $count | \`$sniff\` |"
                done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PHP compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcompat-checkstyle
          path: ./phpcompat-checkstyle.xml
          if-no-files-found: ignore

  composer-validate:
    name: composer.json validity
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for composer.json
        id: check
        run: |
          if [ -f composer.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No composer.json at repo root; skipping."
          fi

      - name: Setup PHP
        if: steps.check.outputs.exists == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        if: steps.check.outputs.exists == 'true'
        run: composer validate --no-check-publish --no-check-all
